<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Sorcerer | Jujutsu RPG</title>
    <style>
        /* Ajuste para garantir que o conteúdo fique centralizado e não "fuja" da tela */
        body { 
            background-color: #0a0a0c; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
        }
        
        .container { 
            width: 100%; 
            max-width: 650px; 
            border: 1px solid #3a0066; 
            padding: 30px; 
            background-color: #121216; 
            box-shadow: 0 0 30px rgba(88, 0, 255, 0.15); 
            border-radius: 12px; 
            text-align: center;
            box-sizing: border-box; /* Importante para não quebrar o layout com padding */
        }

        h1 { color: #a855f7; text-transform: uppercase; letter-spacing: 5px; border-bottom: 2px solid #3a0066; padding-bottom: 15px; margin-bottom: 25px; font-size: 2.2em; }
        
        .menu { margin-bottom: 30px; padding: 12px; background: #1a1a20; border-radius: 8px; border: 1px solid #2a2a30; }
        .menu a { color: #a855f7; margin: 0 10px; text-decoration: none; font-weight: bold; font-size: 0.85em; letter-spacing: 1px; }
        .menu a:hover { color: #d8b4fe; text-shadow: 0 0 10px #a855f7; }

        /* Ajuste da Imagem para ela nunca ultrapassar o quadrado do site */
        .image-container {
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }
        
        .image-container img { 
            max-width: 100%; 
            height: auto; 
            border-radius: 8px; 
            border: 2px solid #3a0066; 
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
            display: block;
        }

        .welcome-text { font-size: 1.3em; margin: 20px 0; color: #f3f4f6; font-weight: 500; }
        
        .credits-box { 
            background: rgba(58, 0, 102, 0.2); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #3a0066; 
            display: inline-block; 
            margin-top: 10px;
        }
        
        .credits-box p { margin: 5px 0; font-size: 0.95em; }
        .label { color: #a855f7; font-weight: bold; text-transform: uppercase; font-size: 0.75em; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>New Sorcerer</h1>
        
        <div class="menu">
            <a href="index.html">INÍCIO</a> | 
            <a href="feiticeiros.html">FEITICEIROS</a> | 
            <a href="maldicoes.html">MALDIÇÕES</a>
        </div>

        <div class="image-container">
            <img src="https://i.pinimg.com/736x/14/8f/2e/148f2eeed0c00edcee48af763e129875.jpg" alt="Logo New Sorcerer">
        </div>

        <p class="welcome-text">Sejam bem-vindos ao New Sorcerer RPG!</p>

        <div class="credits-box">
            <span class="label">Créditos</span>
            <p><strong>GH</strong> (Criador do Site)</p>
            <p><strong>Akashi</strong> (GM)</p>
        </div>

        <footer style="margin-top: 40px; font-size: 0.7em; opacity: 0.4;">
            <p>© 2026 New Sorcerer</p>
        </footer>
    </div>

</body>
</html>
