<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Sorcerer</title>
    <style>
        body { background-color: #2c1e14; color: #f4e4bc; font-family: 'Georgia', serif; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 2px solid #8b4513; padding: 30px; background-color: #3e2b1d; box-shadow: 10px 10px 5px 0px rgba(0,0,0,0.75); }
        h1 { color: #d4af37; text-align: center; border-bottom: 2px solid #d4af37; }
        .menu { text-align: center; margin-bottom: 20px; }
        .menu a { color: #d4af37; margin: 0 10px; text-decoration: none; font-weight: bold; }
        .menu a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>New Sorcerer</h1>
        <div class="menu">
            <a href="#">Início</a> | <a href="#">Feiticeiros</a> | <a href="#">Maldições</a>
        </div>
        <p>Bem-vindo ao New Sorcerer, aventure-se por um mundo de feiticeiros e maldições.</p>
        <h2>Última Missão</h2>
        <p>O grupo derrotou os goblins na Caverna de Cristal e recuperou o amuleto perdido.</p>
    </div<div style="text-align: center; margin: 20px; border: 1px dashed #d4af37; padding: 10px;">
    <button onclick="rolarD20()" style="background-color: #d4af37; color: #2c1e14; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; font-family: 'Georgia';">
        Rolar D20
    </button>
    <p id="resultado" style="font-size: 24px; font-weight: bold; margin-top: 10px;">--</p>
</div>

<script>
    function rolarD20() {
        const resultado = Math.floor(Math.random() * 20) + 1;
        const campo = document.getElementById('resultado');
        campo.innerText = "Resultado: " + resultado;
        
        // Cor especial se for Crítico!
        if (resultado === 20) campo.style.color = "gold";
        else if (resultado === 1) campo.style.color = "red";
        else campo.style.color = "#f4e4bc";
    }
</script>>
</body>
</html>
