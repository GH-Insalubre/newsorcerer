<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Sorcerer | Jujutsu RPG</title>
    <style>
        /* BASE E IMAGEM DE FUNDO ATUALIZADA */
        body { 
            background-color: #0a0a0c; /* Cor de fundo caso a imagem falhe */
            background-image: url('https://i.pinimg.com/1200x/ee/72/25/ee7225f154eaf4ed232dbf8824cd7cbb.jpg'); /* O link da sua imagem */
            background-position: center center; /* Centraliza a imagem */
            background-repeat: no-repeat; /* Não repete a imagem */
            background-size: cover; /* Faz a imagem cobrir toda a tela sem distorcer */
            background-attachment: fixed; /* A imagem fica parada quando você rola a página (efeito parallax) */
            
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }
        
        /* CONTAINER PRINCIPAL */
        .container { 
            width: 100%; 
            max-width: 650px; 
            border: 1px solid #3a0066; 
            padding: 30px; 
            background-color: #121216; 
            box-shadow: 0 0 30px rgba(88, 0, 255, 0.15); 
            border-radius: 12px; 
            text-align: center;
            box-sizing: border-box;
            position: relative; /* Para alinhar o hambúrguer */
        }

        h1 { color: #a855f7; text-transform: uppercase; letter-spacing: 5px; border-bottom: 2px solid #3a0066; padding-bottom: 15px; margin-bottom: 25px; font-size: 2.2em; }
        
        /* BARRA DO MEIO (Apenas Início agora) */
        .menu-bar { 
            margin-bottom: 30px; 
            padding: 12px; 
            background: #1a1a20; 
            border-radius: 8px; 
            border: 1px solid #2a2a30; 
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .menu-bar a { color: #a855f7; text-decoration: none; font-weight: bold; font-size: 0.9em; letter-spacing: 1px; }

        /* --- BOTÃO HAMBÚRGUER --- */
        .hamburger-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: #a855f7;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001; /* Garante que fica por cima de tudo */
        }

        /* --- MENU LATERAL OCULTO (OVERLAY) --- */
        .nav-overlay {
            position: fixed;
            top: 0;
            right: -100%; /* Começa escondido à direita */
            width: 250px;
            height: 100%;
            background-color: #0e0e11;
            border-left: 2px solid #3a0066;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            padding: 80px 20px 20px 20px;
            transition: right 0.3s ease-in-out; /* Animação suave */
            z-index: 1000;
            box-sizing: border-box;
        }

        /* Quando o menu está aberto */
        .nav-overlay.active {
            right: 0;
        }

        /* Links dentro do menu lateral */
        .nav-overlay a {
            color: #d8b4fe;
            text-decoration: none;
            font-size: 1.1em;
            padding: 15px 10px;
            border-bottom: 1px solid #2a2a30;
            text-align: left;
            transition: background 0.2s;
        }
        .nav-overlay a:hover {
            background-color: #1a1a20;
            color: white;
            text-shadow: 0 0 10px #a855f7;
        }

        /* BOTÃO DE FECHAR DENTRO DO MENU */
        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            color: #f472b6;
            font-size: 30px;
            cursor: pointer;
        }

        /* ELEMENTOS DO SITE */
        .image-container { width: 100%; margin-bottom: 25px; display: flex; justify-content: center; }
        .image-container img { max-width: 100%; height: auto; border-radius: 8px; border: 2px solid #3a0066; box-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
        .welcome-text { font-size: 1.3em; margin: 20px 0; color: #f3f4f6; }
        .credits-box { background: rgba(58, 0, 102, 0.2); padding: 15px; border-radius: 8px; border: 1px solid #3a0066; display: inline-block; margin-top: 10px;}
        .credits-box p { margin: 5px 0; font-size: 0.95em; }
        .label { color: #a855f7; font-weight: bold; text-transform: uppercase; font-size: 0.75em; display: block; margin-bottom: 5px; }
        footer { margin-top: 40px; font-size: 0.7em; opacity: 0.4; text-align: center;}
    </style>
</head>
<body>

    <div class="container">
        <h1>New Sorcerer</h1>
        
        <div class="menu-bar">
            <a href="index.html">INÍCIO</a>
            <button class="hamburger-btn" onclick="toggleMenu()">☰</button>
        </div>

        <div class="nav-overlay" id="navOverlay">
            <button class="close-btn" onclick="toggleMenu()">×</button>
            <a href="feiticeiros.html">Feiticeiros</a>
            <a href="maldicoes.html">Maldições</a>
            <a href="energia.html">Energia Amaldiçoada</a>
            <a href="#">Expansão de Domínio</a> </div>

        <div class="image-container">
            <img src="https://i.pinimg.com/736x/14/8f/2e/148f2eeed0c00edcee48af763e129875.jpg" alt="Logo New Sorcerer">
        </div>

        <p class="welcome-text">Sejam bem-vindos ao New Sorcerer RPG!</p>

        <div class="credits-box">
            <span class="label">Créditos</span>
            <p><strong>GH</strong> (Criador do Site)</p>
            <p><strong>Akashi</strong> (GM)</p>
        </div>

        <footer>
            <p>© 2026 New Sorcerer</p>
        </footer>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('navOverlay');
            // Adiciona ou remove a classe 'active' que faz o menu deslizar
            menu.classList.toggle('active');
        }
    </script>

</body>
</html>
