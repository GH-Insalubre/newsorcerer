<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha | New Sorcerer</title>
    <style>
        body { 
            background-color: #0a0a0c; 
            background-image: url('https://i.pinimg.com/736x/d0/f9/c4/d0f9c452f55c7db963a9741e4c687d0e.jpg'); 
            background-position: center; 
            background-repeat: no-repeat; 
            background-size: cover; 
            background-attachment: fixed; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; 
            min-height: 100vh; 
        }
        .container { 
            width: 100%; max-width: 700px; 
            border: 1px solid #3a0066; 
            padding: 30px; 
            background-color: rgba(18, 18, 22, 0.95); 
            box-shadow: 0 0 30px rgba(88, 0, 255, 0.2); 
            border-radius: 12px; 
            box-sizing: border-box;
        }
        h1 { color: #a855f7; text-align: center; text-transform: uppercase; border-bottom: 2px solid #3a0066; padding-bottom: 10px; margin-bottom: 30px; letter-spacing: 3px; }
        h2 { color: #d8b4fe; border-left: 4px solid #a855f7; padding-left: 15px; margin-top: 30px; font-size: 1.1em; text-transform: uppercase; }
        
        .back-btn { display: inline-block; margin-bottom: 20px; color: #a855f7; text-decoration: none; font-weight: bold; font-size: 0.9em; }
        
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #a855f7; font-weight: bold; margin-bottom: 8px; font-size: 0.85em; text-transform: uppercase; }
        
        input[type="text"], input[type="number"], textarea, select {
            width: 100%;
            padding: 12px;
            background: #1a1a20;
            border: 1px solid #3a0066;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
            outline: none;
        }

        /* Estilo específico para o seletor de Raça */
        select option {
            background: #1a1a20;
            color: #fff;
        }

        textarea { height: 100px; resize: vertical; }

        .atributos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: #6b21a8;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }
        .save-btn:hover { background: #a855f7; box-shadow: 0 0 15px #a855f7; }

        @media (max-width: 500px) {
            .atributos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Voltar ao Início</a>
        <h1>Ficha</h1>
        
        <form>
            <h2>Informações Básicas</h2>
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" placeholder="Nome do Personagem">
            </div>

            <div class="atributos-grid">
                <div class="form-group">
                    <label>Idade:</label>
                    <input type="number" placeholder="Ex: 17">
                </div>
                <div class="form-group">
                    <label>Raça:</label>
                    <select>
                        <option value="" disabled selected>Selecione uma Raça</option>
                        <option value="humano">Humano</option>
                        <option value="maldicao-comum">Maldição Comum</option>
                        <option value="maldicao-humana">Maldição Humana</option>
                        <option value="desastres-humanos">Maldição Desastres Humanos</option>
                        <option value="desastres-naturais">Maldição Desastres Naturais</option>
                        <option value="espirito-vingativo">Espirito Vingativo</option>
                        <option value="maldicao-mitologica">Maldição Mitológica</option>
                        <option value="feto-amaldicoado">Feto Amaldiçoado</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Clã:</label>
                <input type="text" placeholder="Ex: Zenin, Inumaki...">
            </div>

            <div class="form-group">
                <label>Personalidade:</label>
                <textarea placeholder="Traços de personalidade..."></textarea>
            </div>

            <div class="form-group">
                <label>História:</label>
                <textarea placeholder="Origem e motivações..."></textarea>
            </div>

            <hr style="border: 0; border-top: 1px solid #3a0066; margin: 40px 0;">

            <h2>Atributos</h2>
            <div class="atributos-grid">
                <div class="form-group">
                    <label>Força:</label>
                    <input type="number" value="0">
                </div>
                <div class="form-group">
                    <label>Velocidade:</label>
                    <input type="number" value="0">
                </div>
                <div class="form-group">
                    <label>Resistência:</label>
                    <input type="number" value="0">
                </div>
                <div class="form-group">
                    <label>Estamina:</label>
                    <input type="number" value="0">
                </div>
                <div class="form-group">
                    <label>Jujutsu:</label>
                    <input type="number" value="0">
                </div>
                <div class="form-group">
                    <label>Energia Amaldiçoada:</label>
                    <input type="number" value="0">
                </div>
            </div>

            <button type="button" class="save-btn">Concluir Personagem</button>
        </form>

        <footer style="margin-top: 40px; text-align: center; font-size: 0.7em; opacity: 0.5;">
            <p>© 2026 New Sorcerer RPG</p>
        </footer>
    </div>
</body>
</html>
