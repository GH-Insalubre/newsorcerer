<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha | New Sorcerer</title>
    <style>
        body { background-color: #0a0a0c; background-image: url('https://i.pinimg.com/736x/d0/f9/c4/d0f9c452f55c7db963a9741e4c687d0e.jpg'); background-position: center; background-repeat: no-repeat; background-size: cover; background-attachment: fixed; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 750px; border: 1px solid #3a0066; padding: 30px; background-color: rgba(18, 18, 22, 0.95); box-shadow: 0 0 30px rgba(88, 0, 255, 0.2); border-radius: 12px; box-sizing: border-box; }
        h1 { color: #a855f7; text-align: center; text-transform: uppercase; border-bottom: 2px solid #3a0066; padding-bottom: 10px; margin-bottom: 30px; }
        h2 { color: #d8b4fe; border-left: 4px solid #a855f7; padding-left: 15px; margin-top: 30px; font-size: 1.1em; text-transform: uppercase; }
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #a855f7; font-weight: bold; margin-bottom: 5px; font-size: 0.85em; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 10px; background: #1a1a20; border: 1px solid #3a0066; color: #fff; border-radius: 6px; box-sizing: border-box; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        #whatsapp-preview { background: #050505; border: 2px solid #3a0066; padding: 20px; margin-top: 30px; white-space: pre-wrap; font-family: monospace; font-size: 0.85em; border-radius: 8px; color: #e0e0e0; overflow-x: auto; }
        .copy-btn { width: 100%; padding: 15px; background: #25d366; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" style="color: #a855f7; text-decoration: none; font-weight: bold;">← Voltar</a>
        <h1>Ficha</h1>
        
        <h2>Informações do Player</h2>
        <div class="grid">
            <div class="form-group"><label>Nome:</label><input type="text" id="pNome" oninput="atualizar()"></div>
            <div class="form-group"><label>Idade:</label><input type="text" id="pIdade" oninput="atualizar()"></div>
            <div class="form-group"><label>Disponibilidade:</label><input type="text" id="pDisp" oninput="atualizar()"></div>
            <div class="form-group"><label>Código:</label><input type="text" id="pCod" oninput="atualizar()"></div>
        </div>

        <h2>Informações do Personagem</h2>
        <div class="grid">
            <div class="form-group"><label>Nome:</label><input type="text" id="cNome" oninput="atualizar()"></div>
            <div class="form-group"><label>Idade:</label><input type="text" id="cIdade" oninput="atualizar()"></div>
            <div class="form-group"><label>Gênero:</label><input type="text" id="cGen" oninput="atualizar()"></div>
            <div class="form-group"><label>Raçã:</label>
                <select id="racaSelect" onchange="verificarRaca(); atualizar()">
                    <option value="humano">Humano</option>
                    <option value="feto-amaldicoado">Feto Amaldiçoado</option>
                    <option value="maldicao-comum">Maldição Comum</option>
                    <option value="maldicao-humana">Maldição Humana</option>
                    <option value="desastres-humanos">Maldição Desastres Humanos</option>
                    <option value="desastres-naturais">Maldição Desastres Naturais</option>
                    <option value="espirito-vingativo">Espirito Vingativo</option>
                    <option value="maldicao-mitologica">Maldição Mitológica</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div class="form-group"><label>Altura:</label><input type="text" id="cAlt" oninput="atualizar()"></div>
            <div class="form-group"><label>Peso:</label><input type="text" id="cPeso" oninput="atualizar()"></div>
        </div>

        <div class="form-group" id="campoCla">
            <label>Clã:</label>
            <select id="claSelect" onchange="atualizar()">
                <option value="Nenhum">Nenhum</option>
                <option value="Zenin">Zenin</option>
                <option value="Gojo">Gojo</option>
                <option value="Kamo">Kamo</option>
                <option value="Inumaki">Inumaki</option>
                <option value="Fujiwara">Fujiwara</option>
                <option value="Abe">Abe</option>
            </select>
        </div>

        <div class="form-group"><label>Aparência:</label><input type="text" id="cApa" oninput="atualizar()"></div>
        <div class="form-group"><label>Personalidade:</label><textarea id="cPerso" oninput="atualizar()"></textarea></div>
        <div class="form-group"><label>História:</label><textarea id="cHist" oninput="atualizar()"></textarea></div>

        <h2>Atributos</h2>
        <div class="grid">
            <div class="form-group"><label>Força:</label><input type="number" id="atFor" value="0" oninput="atualizar()"></div>
            <div class="form-group"><label>Velocidade:</label><input type="number" id="atVel" value="0" oninput="atualizar()"></div>
            <div class="form-group"><label>Resistência:</label><input type="number" id="atRes" value="0" oninput="atualizar()"></div>
            <div class="form-group"><label>Estamina:</label><input type="number" id="atEst" value="0" oninput="atualizar()"></div>
            <div class="form-group"><label>Jujutsu:</label><input type="number" id="atJuj" value="0" oninput="atualizar()"></div>
            <div class="form-group"><label>Energia Amaldiçoada:</label><input type="number" id="atEA" value="0" oninput="atualizar()"></div>
        </div>

        <h2>Cópia para WhatsApp</h2>
        <div id="whatsapp-preview"></div>
        <button class="copy-btn" onclick="copiar()">Copiar Ficha Pronta</button>

        <footer style="margin-top: 30px; text-align: center; font-size: 0.7em; opacity: 0.5;"><p>© 2026 New Sorcerer</p></footer>
    </div>

    <script>
        function verificarRaca() {
            const raca = document.getElementById('racaSelect').value;
            document.getElementById('campoCla').style.display = (raca === 'humano' || raca === 'feto-amaldicoado') ? 'block' : 'none';
        }

        function atualizar() {
            const rVal = document.getElementById('racaSelect').value;
            const rTexto = (rVal === 'humano') ? '❪ X ❫ 𝐇umano ❪  ❫ 𝐌aldiçα̃o.' : '❪  ❫ 𝐇umano ❪ X ❫ 𝐌aldiçα̃o.';
            
            const ficha = `📋
ㅤ          ㅤ  𝐈nfinite 𝐒orcerer
ㅤ      ㅤ  𖥔 𝐉𝐔𝐉𝐔𝐓𝐒𝐔 𝐊𝐀𝐈𝐒𝐄𝐍 𖥔
               𝐅ichα de 𝐏ersonαgem
                  

        *𝐅ichα de 𝐏lαyer:*

        𖥔ֺ  𝐍ome: *“${document.getElementById('pNome').value || '...'}”*
        𖥔ֺ  𝐈dαde: *“${document.getElementById('pIdade').value || '...'}”*
        𖥔ֺ  𝐃isponibilidαde: *“${document.getElementById('pDisp').value || '...'}”*
        𖥔ֺ  𝐂ódigo: *“${document.getElementById('pCod').value || '...'}”*

ㅤㅤㅤㅤㅤㅤ────────
        *𝐅ichα de 𝐏ersonαgem:*

       𖥔ֺ   𝐍ome: 
      ━ּ๋━̸ִ━ *“${document.getElementById('cNome').value || '...'}”*
       𖥔ֺ   𝐈dαde: 
      ━ּ๋━̸ִ━ *“${document.getElementById('cIdade').value || '...'}”*
       𖥔ֺ   𝐆ênero: 
      ━ּ๋━̸ִ━ *“${document.getElementById('cGen').value || '...'}”*
       𖥔ֺ   𝐀lturα & 𝐏eso: 
      ━ּ๋━̸ִ━ *“${document.getElementById('cAlt').value || '...'} / ${document.getElementById('cPeso').value || '...'}”*
       𖥔ֺ   𝐀pαrênciα: 
      ━ּ๋━̸ִ━ *“${document.getElementById('cApa').value || '...'}”*
       𖥔ֺ   𝐑αçα: 
      ━ּ๋━̸ִ━ *${rTexto}*
       𖥔ֺ   𝐂lα̃: 
      ━ּ๋━̸ִ━ *“${document.getElementById('claSelect').value}”*
       𖥔ֺ   𝐏ersonαlidαde: 
      ━ּ๋━̸ִ━ *“${document.getElementById('cPerso').value || '...'}”*
       𖥔ֺ   𝐇istóriα: 
      ━ּ๋━̸ִ━ *“${document.getElementById('cHist').value || '...'}”*
       𖥔ֺ   𝐃inheiro: 
      ━ּ๋━̸ִ━ *5.000¥.*
ㅤㅤㅤㅤㅤㅤ────────

       𖥔ֺ  *𝐀tributos:* 「 𝟏.𝟎𝟎𝟎 pontos pαrα distribuir. 」

        𖥔ֺ  𝐅orçα: ${document.getElementById('atFor').value}
        𖥔ֺ  𝐕elocidαde: ${document.getElementById('atVel').value}
        𖥔ֺ  𝐑esistênciα: ${document.getElementById('atRes').value}
        𖥔ֺ  𝐄stαminα: ${document.getElementById('atEst').value}
        𖥔ֺ  𝐉ujutsu: ${document.getElementById('atJuj').value}
        𖥔ֺ  𝐄.𝐀: ${document.getElementById('atEA').value}

ㅤㅤㅤㅤㅤㅤ────────
       𝐎𝐁𝐒: Esta ficha tem como base, estrutura e elementos da autoria de:

                    ⛩️⃚𐇽֟፝⃞᷼𝐊ׄɪɭɭʋ֗ɑ⃨𝆬❋`;
            document.getElementById('whatsapp-preview').innerText = ficha;
        }

        function copiar() {
            const t = document.getElementById('whatsapp-preview').innerText;
            navigator.clipboard.writeText(t).then(() => alert("Copiado!"));
        }
        window.onload = () => { verificarRaca(); atualizar(); };
    </script>
</body>
</html>
